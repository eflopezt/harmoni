<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#1a4a42"/>
      <stop offset="100%" stop-color="#071816"/>
    </radialGradient>
    <linearGradient id="wv" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a7a6e"/>
      <stop offset="30%"  stop-color="#0d9488"/>
      <stop offset="50%"  stop-color="#5eead4"/>
      <stop offset="70%"  stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0a7a6e"/>
    </linearGradient>
    <filter id="gw" x="-80%" y="-200%" width="260%" height="500%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" fill="url(#bg)" rx="6"/>
  <!-- Wave outer glow -->
  <path d="M 2,18 C 8,24 14,10 16,17 C 18,24 24,10 30,16"
        stroke="#5eead4" stroke-width="5" fill="none"
        stroke-linecap="round" opacity="0.25" filter="url(#gw)"/>
  <!-- Wave body -->
  <path d="M 2,18 C 8,24 14,10 16,17 C 18,24 24,10 30,16"
        stroke="url(#wv)" stroke-width="2.4" fill="none"
        stroke-linecap="round"/>
  <!-- Wave center highlight -->
  <path d="M 2,18 C 8,24 14,10 16,17 C 18,24 24,10 30,16"
        stroke="#c8faf2" stroke-width="0.7" fill="none"
        stroke-linecap="round" opacity="0.65"/>
  <!-- Left pillar (front) -->
  <rect x="8"  y="3" width="5" height="23" rx="2.5" fill="white"/>
  <!-- Right pillar (front) -->
  <rect x="19" y="3" width="5" height="23" rx="2.5" fill="white"/>
  <!-- Particles -->
  <circle cx="4.5"  cy="18"   r="0.9" fill="#5eead4" opacity="0.95"/>
  <circle cx="27.5" cy="15.5" r="0.9" fill="#5eead4" opacity="0.95"/>
  <circle cx="16"   cy="17"   r="0.7" fill="#ffffff"  opacity="0.5"/>
</svg>
