# Nginx config for nexotalent.pe
# Puede usarse como landing page o como alias de Harmoni

upstream nexotalent_app {
    server 127.0.0.1:8000;
}

# Redirect www to non-www
server {
    listen 80;
    server_name www.nexotalent.pe;
    return 301 https://nexotalent.pe$request_uri;
}

server {
    listen 80;
    server_name nexotalent.pe;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name nexotalent.pe;

    # Certbot will fill these:
    # ssl_certificate /etc/letsencrypt/live/nexotalent.pe/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nexotalent.pe/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    location /static/ {
        alias /opt/harmoni/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /opt/harmoni/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /asistencia/ia/chat/ {
        proxy_pass http://nexotalent_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://nexotalent_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
